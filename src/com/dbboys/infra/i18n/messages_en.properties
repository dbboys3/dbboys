remote.install.oracle.step1.name=Uninstall Existing Oracle
remote.install.oracle.step1.desc=Stop existing database/listener, remove oracle user, wipe all Oracle directories and config files.
remote.install.oracle.step2.name=Check /opt Disk Space
remote.install.oracle.step2.desc=Verify that /opt has at least 10GB of free disk space.
