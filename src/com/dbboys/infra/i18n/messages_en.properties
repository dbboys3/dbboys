remote.install.oracle.step8.desc=Create the database using DBCA in silent mode.
remote.install.oracle.step9.name=Configure Listener
remote.install.oracle.step9.desc=Configure Oracle Net Listener using netca.
remote.install.oracle.step10.name=Register Service
remote.install.oracle.step10.desc=Configure oracle user bash_profile, create systemd service unit, and generate orapwd file.
