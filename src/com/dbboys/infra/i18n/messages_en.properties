remote.install.oracle.step6.desc=Extract Oracle installation zip(s) into /opt/oracle/staging. Skip for RPM packages.
remote.install.oracle.step7.name=Install Binaries
remote.install.oracle.step7.desc=Run Oracle Universal Installer in silent mode (11g/12c) or rpm install (18c+), then run root.sh.
