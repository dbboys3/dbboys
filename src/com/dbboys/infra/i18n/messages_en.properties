remote.install.desc.item3=3. Existing GBase 8s installation and related data will be removed before installation.
remote.install.desc.item4=4. The wizard supports GBase 8s V8.7 and V8.8.
remote.install.informix.desc.item1=1. Remote installation is only for Linux/Unix and not supported on Windows.
remote.install.informix.desc.item2=2. You can prepare the downloaded Informix package in advance, or download it automatically during installation.
remote.install.informix.desc.item3=3. Existing Informix installation and related data will be removed before installation.
