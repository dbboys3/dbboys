# Oracle remote install/uninstall
remote.install.oracle.desc.item1=1. Remote install supports Linux/Unix only (RHEL/CentOS 7+ recommended), not Windows.
remote.install.oracle.desc.item2=2. Prepare an Oracle 11g/19c Linux x86_64 installation package (zip or rpm), or download the matched package automatically.
remote.install.oracle.desc.item3=3. The wizard uses silent install (runInstaller -silent), creates the database with DBCA, configures the listener, and sets up systemd auto-start.
remote.install.oracle.desc.item4=4. Existing Oracle installations by this wizard will be removed before installation.
