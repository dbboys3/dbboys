remote.install.mysql.desc.item1=1. Remote install supports Linux/Unix only, not Windows.
remote.install.mysql.desc.item2=2. Prepare a MySQL 5.7 or MySQL 8 Linux generic tar.gz package, then upload it or enter an existing remote path.
remote.install.mysql.desc.item3=3. The wizard extracts the package, initializes the data directory, configures my.cnf, starts mysqld, and sets the root password.
remote.install.mysql.desc.item4=4. Existing MySQL installed by this wizard will be removed before installation.
