# Oracle遠端安裝/卸載
remote.install.oracle.desc.item1=1. 遠端安裝僅用於Linux/Unix系統（建議RHEL/CentOS 7+），不適用於Windows系統。
remote.install.oracle.desc.item2=2. 準備Oracle 11g/19c Linux x86_64安裝包（zip或rpm），或透過自動下載取得匹配的安裝包。
remote.install.oracle.desc.item3=3. 安裝精靈透過靜默安裝（runInstaller -silent）、DBCA靜默建庫、netca設定監聽、建立systemd自啟動服務完成全部安裝。
remote.install.oracle.desc.item4=4. 安裝前會自動卸載之前已存在的Oracle資料庫安裝，並清理所有相關資訊。
remote.install.oracle.package.local_hint=請選擇Oracle 11g/19c Linux x86_64安裝包（zip、rpm或tar）。
remote.install.oracle.cfg.root_password.name=Root密碼
remote.install.oracle.cfg.root_password.desc=遠端伺服器root密碼，用於建立oracle使用者和設定核心參數。
remote.install.oracle.cfg.oracle_base.desc=Oracle基礎目錄，ORACLE_HOME將建立在該目錄下。
remote.install.oracle.cfg.oracle_home.desc=Oracle家目錄，二進位檔案安裝位置。
