remote.uninstall.oracle.desc.item2=2. 遠端卸載會自動停止資料庫/監聽，刪除服務、Oracle安裝目錄和oracle使用者/使用者群組。
remote.uninstall.oracle.step1.name=停止Oracle行程
remote.uninstall.oracle.step1.desc=殺死所有Oracle行程並停止oracle服務。
remote.uninstall.oracle.step2.name=清理共享記憶體
remote.uninstall.oracle.step2.desc=刪除Oracle共享記憶體段。
remote.uninstall.oracle.step3.name=卸載RPM套件
remote.uninstall.oracle.step3.desc=卸載包含oracle-database關鍵字的Oracle RPM套件。
