remote.install.oracle.step10.desc=設定oracle使用者bash_profile環境變數、建立systemd服務單元、產生orapwd密碼檔案。
remote.install.oracle.step11.name=啟用服務自啟動
remote.install.oracle.step11.desc=啟用systemd oracle.service實現系統開機自啟動。
