remote.install.mysql.desc.item2=2、請準備MySQL 5.7或MySQL 8的Linux通用tar.gz安裝包，可上傳本機安裝包或填寫遠端伺服器既有路徑。
remote.install.mysql.desc.item3=3、精靈會解壓安裝包、初始化資料目錄、產生my.cnf、啟動mysqld並設定root密碼。
