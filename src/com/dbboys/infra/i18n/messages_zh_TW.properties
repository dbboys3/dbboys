remote.install.oracle.step1.desc=停止已有資料庫/監聽，刪除之前安裝的Oracle目錄和oracle使用者。
remote.install.oracle.step2.name=檢查/opt磁碟空間
remote.install.oracle.step2.desc=檢查/opt目錄可用空間是否大於10GB。
