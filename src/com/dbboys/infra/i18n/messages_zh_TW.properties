remote.install.desc.title=說明：
remote.install.desc.item1=1、遠端安裝僅用於Linux或Unix系統，不適用於Windows系統。
remote.install.desc.item2=2、安裝前可先準備已下載安裝包，或在安裝過程中自動下載。
remote.install.desc.item2.local_only=2、安裝前請準備好已下載的安裝包，並在後續步驟填寫本機或遠端路徑。
remote.install.desc.item3=3、安裝前會自動卸載現有GBase 8s並清理相關資訊。
remote.install.desc.item4=4、遠端安裝精靈支援GBase 8s V8.7、V8.8。
remote.install.informix.desc.item1=1、遠端安裝僅用於Linux或Unix系統，不適用於Windows系統。
remote.install.informix.desc.item2=2、安裝前可先準備好已下載的Informix安裝包，如未準備，可在安裝過程中自動下載。
remote.install.informix.desc.item3=3、安裝前會自動卸載既有的Informix資料庫安裝，並清理相關資訊。
remote.install.informix.desc.item4=4、遠端安裝精靈支援Informix 12.1以上版本安裝。
remote.provider.install.desc.cleanup=3、安裝前會自動卸載既有的%s資料庫安裝，並清理相關資訊。
remote.provider.uninstall.desc.cleanup=2、遠端解除安裝會自動卸載既有的%s資料庫安裝，並清理相關資訊。
